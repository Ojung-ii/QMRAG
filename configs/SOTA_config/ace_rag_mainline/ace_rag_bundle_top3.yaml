extends: ace_rag_common_top3.yaml

generation:
  prompt_profile: ace_rag_bundle_qa
  rendering_profile: structured_chain
  token_counting:
    enabled: true
    tokenizer_model: auto
    fallback_to_estimate: true

sota_config:
  role: compact_efficiency_bundle_top3
  prompt_experiment_type: compact_ablation
  context: compact_replay
  top_bundles: 3
  compaction_profile: top3_chain_dedup
  context_token_budget: null
  notes:
    - Same top3_chain_dedup compact context as common_top3, with the ACE-RAG-bundle prompt.
    - Optional prompt ablation only; the paper-facing compact result uses common_qa.
    - Implement with replay_generation.py --compaction-profile top3_chain_dedup to avoid rerunning retrieval.
    - This is not the primary fair-comparison mainline.
